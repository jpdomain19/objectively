<!DOCTYPE html>

<head>

<style>

  <circle cx="1010" cy="290" r="7" fill="#c8f135" opacity="0.7"/>

  <circle cx="1122" cy="168" r="9" fill="#ff6b35" stroke="#0a0a0a" stroke-width="2"/>

  <!-- Baseline -->
  <line x1="800" y1="630" x2="1200" y2="630" stroke="#1e1e1e" stroke-width="2"/>

  <text x="50" y="290" font-family="Arial Black, Arial, sans-serif" font-size="88" font-weight="900" fill="#f0f0f0" letter-spacing="-2">OBJECTIVELY</text>
